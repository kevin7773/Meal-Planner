name: Validate planner

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-recipes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Planner checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Test semantic validation rules
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate recipe image metadata
        run: python scripts/recipe_images.py validate

      - name: Validate cookbook audit records
        run: python scripts/recipe_audit.py validate

      - name: Run focused recipe editor regression tests
        run: python -m unittest tests/test_recipe_editor.py

      - name: Enforce deterministic planner performance baseline
        run: >-
          python scripts/performance_gate.py check
          --report-output artifacts/planner-simulation-report.json

      - name: Upload planner simulation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-simulation-report
          path: artifacts/planner-simulation-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Validate recipe library
        run: python scripts/validate_recipes.py

      - name: Validate inventory model
        run: python scripts/inventory.py validate

      - name: Validate meal overrides
        run: python scripts/meal_override.py validate

      - name: Validate recipe idea backlog
        run: python scripts/recipe_ideas.py validate

      - name: Validate generated idea pools
        run: python scripts/generated_idea_pools.py validate

      - name: Validate planning rule registry
        run: python scripts/planning_rules.py validate

      - name: Validate side-dish library
        run: python scripts/side_dishes.py validate

      - name: Validate kid quick-meal library
        run: python scripts/quick_meals.py validate

      - name: Validate weather planning context
        run: python scripts/weather_context.py validate

      - name: Validate planner telemetry
        run: python scripts/planner_telemetry.py validate

      - name: Validate weekly planning statuses
        run: python scripts/menu_status.py check-all
