name: Validate recipes

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-recipes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Recipe library
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate recipe library
        run: python scripts/validate_recipes.py
